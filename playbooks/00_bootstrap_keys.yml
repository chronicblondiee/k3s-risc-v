---
- name: Bootstrap the admin user and deploy SSH key
  hosts: k8s_nodes
  gather_facts: false
  become: true
  vars:
    admin_user: "{{ bootstrap_admin_user | default(ansible_user) }}"
    bootstrap_pubkey_path: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
  tasks:
    - name: Ensure admin user exists
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: sudo
        append: true
        shell: /bin/bash
        create_home: true

    - name: Allow passwordless sudo for the admin user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/90-{{ admin_user }}"
        content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Ensure .ssh directory exists for {{ admin_user }}
      ansible.builtin.file:
        path: "/home/{{ admin_user }}/.ssh"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0700"

    - name: Deploy local ed25519 public key
      ansible.posix.authorized_key:
        user: "{{ admin_user }}"
        state: present
        key: "{{ lookup('file', bootstrap_pubkey_path) }}"
