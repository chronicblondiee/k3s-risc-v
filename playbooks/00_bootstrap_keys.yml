---
- name: Deploy SSH key for the admin user (password auth, run once before anything else)
  hosts: k8s_nodes
  gather_facts: false
  tasks:
    - name: Ensure .ssh directory exists for {{ ansible_user }}
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Deploy local ed25519 public key
      ansible.posix.authorized_key:
        user: "{{ ansible_user }}"
        state: present
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
