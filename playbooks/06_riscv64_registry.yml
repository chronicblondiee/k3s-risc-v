---
# Configures every riscv64 node to consume one shared LAN registry, then
# deploys that registry exactly once on the designated registry host.
- name: Configure riscv64 nodes to consume the shared local registry
  hosts: riscv64_nodes
  become: true
  vars:
    registry_host_name: "{{ groups[registry_host_group | default('riscv64_registry_host')][0] }}"
    riscv64_registry_endpoint: "{{ hostvars[registry_host_name].ansible_facts.default_ipv4.address }}:{{ registry_node_port | default(30500) }}"
  tasks:
    - name: Abort if run against a non-riscv64 host
      ansible.builtin.assert:
        that: ansible_facts.architecture == "riscv64"
        fail_msg: "This registry mirror config is for riscv64 nodes only."

    - name: Ensure /etc/rancher/k3s exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure k3s containerd to use the shared riscv64 registry
      ansible.builtin.template:
        src: ../templates/k3s-registries.yaml.j2
        dest: /etc/rancher/k3s/registries.yaml
        owner: root
        group: root
        mode: "0644"
      vars:
        mirror_docker_io: true
      notify: restart k3s

  handlers:
    - name: restart k3s
      ansible.builtin.systemd:
        name: k3s
        daemon_reload: true
        enabled: true
        state: restarted
      failed_when: false

- name: Deploy and seed the shared riscv64 OCI registry
  hosts: riscv64_registry_host
  become: true
  vars:
    k3s_user: "{{ ansible_user }}"
    k3s_user_home: "/home/{{ k3s_user }}"
    registry_namespace_effective: "{{ registry_namespace | default('riscv64-registry') }}"
    registry_image_effective: "{{ registry_image | default('registry:3.0.0') }}"
    registry_storage_size_effective: "{{ registry_storage_size | default('4Gi') }}"
    registry_host_name: "{{ inventory_hostname }}"
    registry_node_port_effective: "{{ registry_node_port | default(30500) }}"
    riscv64_registry_endpoint: "{{ ansible_facts.default_ipv4.address }}:{{ registry_node_port_effective }}"
    k3s_pause_image_ref: "localhost/pause:riscv64-local"
    k3s_release_download_base: "https://github.com/{{ k3s_riscv64_release_repo | default('chronicblondiee/k3s-risc-v') }}/releases/download/{{ k3s_riscv64_release_tag | default('riscv64-v1.36.2-k3s1') }}"
    registry_seed_dir: "{{ k3s_user_home }}/riscv64-release-images"
    registry_seed_images:
      - name: pause
        asset: pause-riscv64.oci.tar
        source_ref: localhost/pause:riscv64-local
        ref: "{{ riscv64_registry_endpoint }}/pause:riscv64-local"
        verify_url: "http://{{ riscv64_registry_endpoint }}/v2/pause/tags/list"
        verify_tag: riscv64-local
      - name: klipper-helm
        asset: klipper-helm-riscv64.oci.tar
        source_ref: localhost/klipper-helm:riscv64-local
        ref: "{{ riscv64_registry_endpoint }}/klipper-helm:riscv64-local"
        verify_url: "http://{{ riscv64_registry_endpoint }}/v2/klipper-helm/tags/list"
        verify_tag: riscv64-local
      - name: klipper-lb
        asset: klipper-lb-riscv64.oci.tar
        source_ref: localhost/klipper-lb:v0.4.17
        ref: "{{ riscv64_registry_endpoint }}/rancher/klipper-lb:v0.4.17"
        verify_url: "http://{{ riscv64_registry_endpoint }}/v2/rancher/klipper-lb/tags/list"
        verify_tag: v0.4.17
      - name: metrics-server
        asset: metrics-server-riscv64.oci.tar
        source_ref: localhost/metrics-server:v0.8.1
        ref: "{{ riscv64_registry_endpoint }}/rancher/mirrored-metrics-server:v0.8.1"
        verify_url: "http://{{ riscv64_registry_endpoint }}/v2/rancher/mirrored-metrics-server/tags/list"
        verify_tag: v0.8.1
  tasks:
    - name: Abort if run against a non-riscv64 host
      ansible.builtin.assert:
        that: ansible_facts.architecture == "riscv64"
        fail_msg: "The shared registry host must be riscv64 for this repo's current image path."

    - name: Render riscv64 registry manifest
      ansible.builtin.template:
        src: ../templates/riscv64-registry.yaml.j2
        dest: "{{ k3s_user_home }}/riscv64-registry.yaml"
        owner: "{{ k3s_user }}"
        group: "{{ k3s_user }}"
        mode: "0644"
      vars:
        registry_node_name: "{{ node_hostname }}"
      become: false
      register: registry_manifest

    - name: Apply riscv64 registry manifest
      ansible.builtin.command: "kubectl apply -f {{ k3s_user_home }}/riscv64-registry.yaml"
      environment:
        KUBECONFIG: "{{ k3s_user_home }}/.kube/config"
      become: false
      register: registry_apply
      changed_when: "'unchanged' not in registry_apply.stdout"

    - name: Wait for registry deployment rollout
      ansible.builtin.command: >-
        kubectl -n {{ registry_namespace_effective }} rollout status deployment/riscv64-registry --timeout=120s
      environment:
        KUBECONFIG: "{{ k3s_user_home }}/.kube/config"
      become: false
      changed_when: false

    - name: Ensure release image cache directory exists
      ansible.builtin.file:
        path: "{{ registry_seed_dir }}"
        state: directory
        owner: "{{ k3s_user }}"
        group: "{{ k3s_user }}"
        mode: "0755"

    - name: Check whether each release image is already present in the registry
      ansible.builtin.uri:
        url: "{{ item.verify_url }}"
        status_code: [200, 404]
        return_content: true
      loop: "{{ registry_seed_images }}"
      register: registry_seed_checks

    - name: Download missing release OCI image archives
      ansible.builtin.get_url:
        url: "{{ k3s_release_download_base }}/{{ item.item.asset }}"
        dest: "{{ registry_seed_dir }}/{{ item.item.asset }}"
        mode: "0644"
      loop: "{{ registry_seed_checks.results }}"
      when: item.status == 404 or item.item.verify_tag not in (item.content | default(''))
      become: false

    - name: Import missing release OCI image archives into k3s containerd
      ansible.builtin.command: >-
        k3s ctr -n k8s.io --address /run/k3s/containerd/containerd.sock
        images import {{ registry_seed_dir }}/{{ item.item.asset }}
      loop: "{{ registry_seed_checks.results }}"
      when: item.status == 404 or item.item.verify_tag not in (item.content | default(''))
      changed_when: true

    - name: Tag missing release images for the shared registry
      ansible.builtin.command: >-
        k3s ctr -n k8s.io --address /run/k3s/containerd/containerd.sock
        images tag {{ item.item.source_ref }} {{ item.item.ref }}
      loop: "{{ registry_seed_checks.results }}"
      when: item.status == 404 or item.item.verify_tag not in (item.content | default(''))
      changed_when: true

    - name: Push missing release images into the shared registry
      ansible.builtin.command: >-
        k3s ctr -n k8s.io --address /run/k3s/containerd/containerd.sock
        images push --plain-http {{ item.item.ref }}
      loop: "{{ registry_seed_checks.results }}"
      when: item.status == 404 or item.item.verify_tag not in (item.content | default(''))
      changed_when: true

    - name: Verify all seeded image tags are visible in the registry
      ansible.builtin.uri:
        url: "{{ item.verify_url }}"
        return_content: true
      loop: "{{ registry_seed_images }}"
      register: registry_seed_verify

    - name: Assert all expected image tags are visible
      ansible.builtin.assert:
        that: "item.item.verify_tag in item.content"
        fail_msg: "Registry does not report expected tag {{ item.item.verify_tag }}: {{ item.content }}"
      loop: "{{ registry_seed_verify.results }}"

    - name: Report registry endpoint for operator reference
      ansible.builtin.debug:
        msg: "Shared riscv64 registry reachable at http://{{ riscv64_registry_endpoint }}."
