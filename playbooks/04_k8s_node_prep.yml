---
- name: k3s node prerequisites
  hosts: k8s_nodes
  become: true
  tasks:
    - name: Check for active swap
      ansible.builtin.command: swapon --show
      register: swap_check
      changed_when: false
      failed_when: false

    - name: Check zram-config default settings
      ansible.builtin.slurp:
        src: /etc/default/armbian-zram-config
      register: zram_conf
      failed_when: false

    - name: Report zram/swap state for operator review
      ansible.builtin.debug:
        msg: "swapon: '{{ swap_check.stdout }}'. armbian-zram-config present: {{ zram_conf.content is defined }}."

    - name: Disable any active swap
      ansible.builtin.command: swapoff -a
      when: swap_check.stdout != ""
      changed_when: swap_check.stdout != ""

    - name: Disable zram swap specifically if armbian-zram-config manages it
      ansible.builtin.lineinfile:
        path: /etc/default/armbian-zram-config
        regexp: '^SWAP='
        line: 'SWAP=false'
      when: zram_conf.content is defined
      notify: restart armbian-zram-config

    - name: Comment out swap entries in fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Persist required kernel modules
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"

    - name: Load kernel modules now
      ansible.builtin.command: "modprobe {{ item }}"
      loop:
        - overlay
        - br_netfilter
      changed_when: true

    - name: Set required sysctls for Kubernetes networking
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-kubernetes-cri.conf
        reload: true
      loop:
        - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { name: net.ipv4.ip_forward, value: "1" }

    - name: Ensure persistent journald storage exists
      ansible.builtin.file:
        path: /var/log/journal
        state: directory
        owner: root
        group: systemd-journal
        mode: "2755"
      notify: restart systemd-journald

    - name: Stop distro containerd if it is installed
      ansible.builtin.systemd:
        name: containerd
        enabled: false
        state: stopped
      failed_when: false

  handlers:
    - name: restart armbian-zram-config
      ansible.builtin.systemd:
        name: armbian-zram-config
        state: restarted

    - name: restart systemd-journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
